apiVersion: apps/v1
kind: Deployment
metadata:
  name: ifms-payroll-celery-worker
  labels:
    app.kubernetes.io/name: ifms-payroll
    app.kubernetes.io/component: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ifms-payroll
      app.kubernetes.io/component: celery-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ifms-payroll
        app.kubernetes.io/component: celery-worker
    spec:
      containers:
        - name: worker
          image: ifms-payroll-api:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - app.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
          envFrom:
            - configMapRef:
                name: ifms-payroll-config
            - secretRef:
                name: ifms-payroll-app-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
