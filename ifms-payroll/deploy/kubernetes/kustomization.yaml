# Kustomize base — set your ECR image in `images:` before apply.
#   kubectl apply -k deploy/kubernetes
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ifms-payroll
resources:
  - namespace.yaml
  - configmap.yaml
  - api-deployment.yaml
  - api-service.yaml
  - celery-worker-deployment.yaml
  - celery-beat-deployment.yaml
images:
  - name: ifms-payroll-api
    newName: 111122223333.dkr.ecr.ap-southeast-1.amazonaws.com/ifms-payroll-api
    newTag: latest
