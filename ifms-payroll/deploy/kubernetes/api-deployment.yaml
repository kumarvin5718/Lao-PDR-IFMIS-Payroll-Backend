apiVersion: apps/v1
kind: Deployment
metadata:
  name: ifms-payroll-api
  labels:
    app.kubernetes.io/name: ifms-payroll
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ifms-payroll
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ifms-payroll
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ifms-payroll-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: ifms-payroll-config
            - secretRef:
                name: ifms-payroll-app-secrets
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
