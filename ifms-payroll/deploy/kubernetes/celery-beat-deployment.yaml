apiVersion: apps/v1
kind: Deployment
metadata:
  name: ifms-payroll-celery-beat
  labels:
    app.kubernetes.io/name: ifms-payroll
    app.kubernetes.io/component: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ifms-payroll
      app.kubernetes.io/component: celery-beat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ifms-payroll
        app.kubernetes.io/component: celery-beat
    spec:
      containers:
        - name: beat
          image: ifms-payroll-api:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - app.celery_app
            - beat
            - --loglevel=info
            - --scheduler=celery.beat:PersistentScheduler
          envFrom:
            - configMapRef:
                name: ifms-payroll-config
            - secretRef:
                name: ifms-payroll-app-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
