worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $request_method $superset_login_is_get {
        GET 1;
        HEAD 1;
        default 0;
    }
    map $arg_next $superset_login_next_is_slash {
        default 0;
        ~^/$ 1;
    }
    map $superset_login_is_get$superset_login_next_is_slash $superset_login_next_is_root {
        default 0;
        11 1;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$http_host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Docker embedded DNS — resolve upstream hostnames at request time so nginx starts
        # even when a dependency (e.g. superset) is temporarily down; also refreshes IPs after container recreate.
        resolver 127.0.0.11 valid=10s ipv6=off;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self';" always;

        root /usr/share/nginx/html;
        index index.html;

        # Superset sometimes redirects to /login?next=... (IFMS React route). Send those to Superset login instead.
        # Match on $args so URL-encoded next=... still contains "superset" (e.g. %2Fsuperset%2F).
        # Vite hashed assets — do not fall back to index.html (avoids HTML served as .css/.js MIME errors).
        location /assets/ {
            try_files $uri =404;
            access_log off;
        }

        location = /login {
            if ($args ~* next=.*superset) {
                return 302 $scheme://$http_host/superset/login$is_args$args;
            }
            try_files $uri $uri/ /index.html;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # IFMS FastAPI under /api/v1/<auth|employees|...> — regex wins over prefix /api/v1/ so these hit api:8000.
        # Trailing `.*` so e.g. /api/v1/dashboard/summary matches (not only /api/v1/dashboard/).
        location ~ ^/api/v1/(auth|employees|uploads|bulk-upload|payroll|lookups|master|dashboard|reports|archive|admin|superset)(/.*)?$ {
            proxy_pass http://api:8000$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # Superset SPA calls /api/v1/dashboard/, /api/v1/chart/, etc. Same path must reach Superset, not FastAPI.
        location /api/v1/ {
            proxy_pass http://superset:8088;
            proxy_http_version 1.1;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Script-Name /superset;
        }
        # Other /api/ (non-v1) — IFMS only today; forward to FastAPI.
        location /api/ {
            set $api_pass http://api:8000;
            proxy_pass $api_pass$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Superset 4 has no route for GET /superset or /superset/ (404 upstream); send users to the app home.
        location = /superset {
            return 301 $scheme://$http_host/superset/welcome/;
        }
        location = /superset/ {
            return 301 $scheme://$http_host/superset/welcome/;
        }

        # Superset 4 mixes paths: welcome is /superset/welcome, login is /login (no /superset prefix on upstream).
        # Map public /superset/login/ → upstream /login/. Use literal upstream host (not variable + trailing URI) so
        # nginx rewrites paths predictably.
        location /superset/login/ {
            if ($superset_login_next_is_root) {
                return 302 $scheme://$http_host/superset/login/?next=%2Fsuperset%2Fwelcome%2F;
            }
            proxy_pass http://superset:8088/login/;
            proxy_http_version 1.1;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            # $host omits port — Superset would redirect to https://localhost/... instead of :18443
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Script-Name /superset;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Same redirect rewrites as /superset/ (POST login returns 302 from this location).
            proxy_redirect /login/ $scheme://$http_host/superset/login/;
            proxy_redirect /login $scheme://$http_host/superset/login;
            # Location: /login?next=... or https://host/login?next=... — otherwise browser opens React /login.
            proxy_redirect ~^/login(\?.*)?$ $scheme://$http_host/superset/login$1;
            proxy_redirect ~^https?://[^/]+/login(\?.*)?$ $scheme://$http_host/superset/login$1;
            # Superset may emit Location: https://localhost/superset/... (no port) — app host omits :18443
            proxy_redirect ~^https?://[^/]+(/superset/.*)$ $scheme://$http_host$1;
            proxy_redirect /logout/ $scheme://$http_host/superset/logout/;
            proxy_redirect /logout $scheme://$http_host/superset/logout;
            proxy_redirect http://superset:8088/login/ $scheme://$http_host/superset/login/;
            proxy_redirect http://superset:8088/login $scheme://$http_host/superset/login;
            proxy_redirect http://superset:8088/logout/ $scheme://$http_host/superset/logout/;
            proxy_redirect http://superset:8088/logout $scheme://$http_host/superset/logout;
            # FAB redirects here to / or /welcome after success — browser would otherwise hit React at / or /welcome.
            proxy_redirect ~*^/$ $scheme://$http_host/superset/welcome/;
            proxy_redirect ~*^/welcome/?$ $scheme://$http_host/superset/welcome/;
            proxy_redirect ~^https?://[^/]+/?$ $scheme://$http_host/superset/welcome/;
            proxy_redirect http://superset:8088/superset/welcome/ $scheme://$http_host/superset/welcome/;
            proxy_redirect http://superset:8088/superset/welcome $scheme://$http_host/superset/welcome;
        }
        location = /superset/login {
            return 301 /superset/login/;
        }

        location /superset/ {
            proxy_pass http://superset:8088/superset/;
            proxy_http_version 1.1;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Script-Name /superset;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Use $http_host (includes :port); $host would yield https://localhost/... without :18443.
            proxy_redirect /login/ $scheme://$http_host/superset/login/;
            proxy_redirect /login $scheme://$http_host/superset/login;
            proxy_redirect ~^/login(\?.*)?$ $scheme://$http_host/superset/login$1;
            proxy_redirect ~^https?://[^/]+/login(\?.*)?$ $scheme://$http_host/superset/login$1;
            proxy_redirect ~^https?://[^/]+(/superset/.*)$ $scheme://$http_host$1;
            proxy_redirect /logout/ $scheme://$http_host/superset/logout/;
            proxy_redirect /logout $scheme://$http_host/superset/logout;
            proxy_redirect http://superset:8088/login/ $scheme://$http_host/superset/login/;
            proxy_redirect http://superset:8088/login $scheme://$http_host/superset/login;
            proxy_redirect http://superset:8088/logout/ $scheme://$http_host/superset/logout/;
            proxy_redirect http://superset:8088/logout $scheme://$http_host/superset/logout;
            proxy_redirect ~*^/$ $scheme://$http_host/superset/welcome/;
            proxy_redirect ~*^/welcome/?$ $scheme://$http_host/superset/welcome/;
            proxy_redirect ~^https?://[^/]+/?$ $scheme://$http_host/superset/welcome/;
            proxy_redirect http://superset:8088/superset/welcome/ $scheme://$http_host/superset/welcome/;
            proxy_redirect http://superset:8088/superset/welcome $scheme://$http_host/superset/welcome;
        }

        # Login page HTML references /static/... (absolute from host root); proxy to Superset.
        location /static/ {
            proxy_pass http://superset:8088/static/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /flower/ {
            auth_basic "Flower";
            auth_basic_user_file /etc/nginx/certs/htpasswd;

            set $flower_upstream flower;
            proxy_pass http://$flower_upstream:5555/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
